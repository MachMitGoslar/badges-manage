server {
    listen 80;
    root /usr/share/nginx/html;

    # Proxy API calls to the badges-api container
    location /api/ {
        proxy_pass http://badges-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy dev auth endpoints to badges-api
    location /dev/ {
        proxy_pass http://badges-api:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA: all /manage/ paths fall back to index.html
    location /manage/ {
        try_files $uri $uri/ /manage/index.html;
    }

    # Redirect bare root to /manage/
    location = / {
        return 301 /manage/;
    }
}
